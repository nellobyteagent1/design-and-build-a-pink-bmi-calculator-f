<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BMI Calculator</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="card">
    <h1>BMI Calculator</h1>
    <p class="subtitle">Check your Body Mass Index</p>

    <div class="unit-toggle">
      <button id="btn-metric" class="active" onclick="setUnit('metric')">Metric (kg/cm)</button>
      <button id="btn-imperial" onclick="setUnit('imperial')">Imperial (lb/ft)</button>
    </div>

    <div id="metric-fields">
      <div class="field">
        <label for="height-cm">Height (cm)</label>
        <input type="number" id="height-cm" placeholder="e.g. 170" min="50" max="300" step="0.1">
      </div>
      <div class="field">
        <label for="weight-kg">Weight (kg)</label>
        <input type="number" id="weight-kg" placeholder="e.g. 70" min="10" max="500" step="0.1">
      </div>
    </div>

    <div id="imperial-fields" style="display:none;">
      <div class="row">
        <div class="field">
          <label for="height-ft">Height (ft)</label>
          <input type="number" id="height-ft" placeholder="5" min="1" max="9" step="1">
        </div>
        <div class="field">
          <label for="height-in">Height (in)</label>
          <input type="number" id="height-in" placeholder="7" min="0" max="11" step="0.1">
        </div>
      </div>
      <div class="field">
        <label for="weight-lb">Weight (lb)</label>
        <input type="number" id="weight-lb" placeholder="e.g. 154" min="20" max="1100" step="0.1">
      </div>
    </div>

    <button class="btn" onclick="calculate()">Calculate BMI</button>
    <div class="error" id="error"></div>

    <div class="result" id="result">
      <div class="bmi-value" id="bmi-value"></div>
      <div class="bmi-label" id="bmi-label"></div>
      <div class="scale">
        <div class="scale-marker" id="scale-marker"></div>
      </div>
      <div class="bmi-range" id="bmi-range"></div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
